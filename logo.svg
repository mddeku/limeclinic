<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <defs>
    <!-- Left kidney gradient (green) -->
    <radialGradient id="kGreen" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#c8f07a"/>
      <stop offset="40%" stop-color="#7ED957"/>
      <stop offset="100%" stop-color="#2e7a10"/>
    </radialGradient>
    <!-- Right kidney gradient (dark grey-green) -->
    <radialGradient id="kDark" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#8aabb8"/>
      <stop offset="40%" stop-color="#4a6878"/>
      <stop offset="100%" stop-color="#1e3040"/>
    </radialGradient>
    <!-- Lime slice gradient -->
    <radialGradient id="limeGrad" cx="50%" cy="95%" r="105%">
      <stop offset="0%" stop-color="#e2f97a"/>
      <stop offset="55%" stop-color="#96e040"/>
      <stop offset="100%" stop-color="#5FBF3A"/>
    </radialGradient>
    <!-- Lime inner flesh -->
    <radialGradient id="limeInner" cx="50%" cy="90%" r="100%">
      <stop offset="0%" stop-color="#d8f565"/>
      <stop offset="100%" stop-color="#7ED957"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--  LIME SLICE  (half-circle at top)      -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Outer rind -->
  <path d="M108,108 A54,54 0 0,1 216,108 Z" fill="#3a8c20"/>
  <!-- Inner flesh -->
  <path d="M112,108 A50,50 0 0,1 212,108 Z" fill="url(#limeGrad)"/>
  <!-- Segment lines from center (162,58) to arc -->
  <line x1="162" y1="58" x2="112" y2="108" stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <line x1="162" y1="58" x2="124" y2="103" stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <line x1="162" y1="58" x2="140" y2="64"  stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <line x1="162" y1="58" x2="162" y2="58"  stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <line x1="162" y1="58" x2="184" y2="64"  stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <line x1="162" y1="58" x2="200" y2="103" stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <line x1="162" y1="58" x2="212" y2="108" stroke="#5FBF3A" stroke-width="1.8" opacity="0.7"/>
  <!-- Arc outline -->
  <path d="M108,108 A54,54 0 0,1 216,108 Z" fill="none" stroke="#2e7a10" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="162" cy="58" r="3" fill="#2e7a10" opacity="0.6"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  MALE SYMBOL ♂  (upper-left)          -->
  <!-- ═══════════════════════════════════════ -->
  <circle cx="76" cy="88" r="17" fill="none" stroke="#2e7a10" stroke-width="4"/>
  <line x1="89"  y1="75" x2="108" y2="56" stroke="#2e7a10" stroke-width="4" stroke-linecap="round"/>
  <line x1="93"  y1="56" x2="108" y2="56" stroke="#2e7a10" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="56" x2="108" y2="71" stroke="#2e7a10" stroke-width="4" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  FEMALE SYMBOL ♀  (upper-right)       -->
  <!-- ═══════════════════════════════════════ -->
  <circle cx="247" cy="86" r="17" fill="none" stroke="#6B7280" stroke-width="4"/>
  <line x1="247" y1="103" x2="247" y2="122" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <line x1="236" y1="114" x2="258" y2="114" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  LEFT KIDNEY  (green)                 -->
  <!-- ═══════════════════════════════════════ -->
  <path d="
    M 118,80
    C  96,78  78,95  76,116
    C  74,137  86,156 104,164
    C  116,170 128,167 134,156
    C  140,144 136,128 134,116
    C  132,105 134,94  140,86
    C  144,79  130,78  118,80 Z
  " fill="url(#kGreen)"/>
  <!-- Inner concave (hilum) -->
  <path d="M132,100 C138,108 138,120 132,130" stroke="rgba(0,0,0,0.12)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Highlight -->
  <path d="M92,92 C84,102 82,118 86,130" stroke="rgba(255,255,255,0.45)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  RIGHT KIDNEY  (dark)                 -->
  <!-- ═══════════════════════════════════════ -->
  <path d="
    M 206,80
    C  228,78 246,95 248,116
    C  250,137 238,156 220,164
    C  208,170 196,167 190,156
    C  184,144 188,128 190,116
    C  192,105 190,94  184,86
    C  180,79  194,78  206,80 Z
  " fill="url(#kDark)"/>
  <!-- Inner concave (hilum) -->
  <path d="M192,100 C186,108 186,120 192,130" stroke="rgba(0,0,0,0.15)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Highlight -->
  <path d="M232,92 C240,102 242,118 238,130" stroke="rgba(255,255,255,0.2)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  URETER / connecting tube              -->
  <!-- ═══════════════════════════════════════ -->
  <path d="M134,156 Q162,174 190,156" stroke="#2e7a10" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M162,164 L162,180" stroke="#2e7a10" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  TEXT: LimeClinic                      -->
  <!-- ═══════════════════════════════════════ -->
  <text font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="54" y="230">
    <tspan x="28" fill="#7ED957" font-style="italic">Lime</tspan><tspan fill="#6B7280">Clinic</tspan>
  </text>

  <!-- ═══════════════════════════════════════ -->
  <!--  SUBTITLE                              -->
  <!-- ═══════════════════════════════════════ -->
  <text x="162" y="260" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="13"
        fill="#9CA3AF" letter-spacing="2.5" text-anchor="middle">UROLOGY &amp; ANDROLOGY CENTER</text>
</svg>
